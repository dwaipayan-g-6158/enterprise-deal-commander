openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: Enterprise Deal Commander (EDC) Phase 1 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: deals
    description: Enterprise deal CRUD and lifecycle
  - name: gates
    description: Technical gate progression
  - name: blockers
    description: Deal blockers
  - name: crossSells
    description: Cross-sell products
  - name: intelligence
    description: Pattern engine and analytics
  - name: audit
    description: Audit trail, change digest, replay
  - name: governance
    description: Dispositions, interventions, bat-signal
  - name: lookups
    description: Reference data and engine tuning

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ============ AUTH ============
  /v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate the commander
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /v1/auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current commander
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============ DEALS ============
  /v1/deals:
    get:
      operationId: listDeals
      tags: [deals]
      summary: List deals
      parameters:
        - { name: search, in: query, required: false, schema: { type: string } }
        - { name: stage, in: query, required: false, schema: { type: string } }
        - { name: health, in: query, required: false, schema: { type: string, enum: [GREEN, YELLOW, RED] } }
        - { name: sort, in: query, required: false, schema: { type: string } }
        - { name: state, in: query, required: false, schema: { type: string, enum: [active, archived, deleted] } }
        - { name: limit, in: query, required: false, schema: { type: integer } }
        - { name: offset, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Deal list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealListResponse"
    post:
      operationId: createDeal
      tags: [deals]
      summary: Create a deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/deals/{id}:
    get:
      operationId: getDeal
      tags: [deals]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateDeal
      tags: [deals]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Stage guardrail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StageGuardrailError"
        "422":
          description: Loss archetype required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDeal
      tags: [deals]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Soft-deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/deals/{id}/restore:
    post:
      operationId: restoreDeal
      tags: [deals]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealResponse"
        "409":
          description: Not removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/deals/{id}/archive:
    post:
      operationId: archiveDeal
      tags: [deals]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealResponse"

  # ============ GATES ============
  /v1/deals/{dealId}/gates:
    get:
      operationId: listGates
      tags: [gates]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Gates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateListResponse"
  /v1/deals/{dealId}/gates/{gateCode}:
    put:
      operationId: updateGate
      tags: [gates]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: gateCode, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GateUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateMutationResponse"
  /v1/deals/{dealId}/gates/batch:
    put:
      operationId: updateGatesBatch
      tags: [gates]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GateBatchInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateBatchResponse"

  # ============ BLOCKERS ============
  /v1/deals/{dealId}/blockers:
    get:
      operationId: listBlockers
      tags: [blockers]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: resolved, in: query, required: false, schema: { type: boolean } }
      responses:
        "200":
          description: Blockers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockerListResponse"
    post:
      operationId: createBlocker
      tags: [blockers]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockerResponse"
  /v1/deals/{dealId}/blockers/{blockerId}:
    put:
      operationId: updateBlocker
      tags: [blockers]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: blockerId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockerResponse"
    delete:
      operationId: deleteBlocker
      tags: [blockers]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: blockerId, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Deleted

  # ============ CROSS-SELLS ============
  /v1/deals/{dealId}/cross-sells:
    get:
      operationId: listCrossSells
      tags: [crossSells]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Cross-sells
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossSellListResponse"
    put:
      operationId: updateCrossSells
      tags: [crossSells]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrossSellUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossSellListResponse"

  # ============ INTELLIGENCE ============
  /v1/deals/{dealId}/intelligence:
    get:
      operationId: getDealIntelligence
      tags: [intelligence]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Intelligence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceResponse"
  /v1/intelligence/summary:
    get:
      operationId: getIntelligenceSummary
      tags: [intelligence]
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResponse"
  /v1/intelligence/portfolio-analysis:
    get:
      operationId: getPortfolioAnalysis
      tags: [intelligence]
      responses:
        "200":
          description: Portfolio analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioAnalysisResponse"
  /v1/analytics/autopsy:
    get:
      operationId: getAutopsy
      tags: [intelligence]
      parameters:
        - { name: archetypeId, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Autopsy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutopsyResponse"

  # ============ AUDIT / TEMPORAL ============
  /v1/deals/{dealId}/audit:
    get:
      operationId: listAudit
      tags: [audit]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: entity_type, in: query, required: false, schema: { type: string } }
        - { name: field_changed, in: query, required: false, schema: { type: string } }
        - { name: since, in: query, required: false, schema: { type: string } }
        - { name: until, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer } }
        - { name: offset, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Audit log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditListResponse"
  /v1/deals/{dealId}/changes:
    get:
      operationId: listChanges
      tags: [audit]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: since, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Change digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangesResponse"
  /v1/deals/{dealId}/review-marker:
    post:
      operationId: setReviewMarker
      tags: [audit]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Marker set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewMarkerResponse"
  /v1/deals/{dealId}/snapshot:
    get:
      operationId: getSnapshot
      tags: [audit]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: date, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: Reconstructed snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotResponse"

  # ============ GOVERNANCE ============
  /v1/deals/{dealId}/alerts/{patternCode}/disposition:
    put:
      operationId: setDisposition
      tags: [governance]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: patternCode, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DispositionInput"
      responses:
        "200":
          description: Disposition set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DispositionResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: clearDisposition
      tags: [governance]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: patternCode, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Cleared
  /v1/deals/{dealId}/interventions:
    post:
      operationId: launchIntervention
      tags: [governance]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterventionInput"
      responses:
        "201":
          description: Launched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterventionResponse"
  /v1/deals/{dealId}/bat-signal:
    post:
      operationId: createBatSignal
      tags: [governance]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      responses:
        "201":
          description: Share link minted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatSignalResponse"
  /v1/share/{token}:
    get:
      operationId: getSharedRiskCard
      tags: [governance]
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Read-only risk card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareCardResponse"
        "401":
          description: Expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============ LOOKUPS ============
  /v1/lookups/pipeline-stages:
    get:
      operationId: listPipelineStages
      tags: [lookups]
      responses:
        "200":
          description: Stages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStageListResponse"
  /v1/lookups/pricing-models:
    get:
      operationId: listPricingModels
      tags: [lookups]
      responses:
        "200":
          description: Models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingModelListResponse"
  /v1/lookups/services-tiers:
    get:
      operationId: listServicesTiers
      tags: [lookups]
      responses:
        "200":
          description: Tiers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicesTierListResponse"
  /v1/lookups/product-catalog:
    get:
      operationId: listProductCatalog
      tags: [lookups]
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
  /v1/lookups/gate-definitions:
    get:
      operationId: listGateDefinitions
      tags: [lookups]
      responses:
        "200":
          description: Gate definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateDefinitionListResponse"
  /v1/lookups/blocker-categories:
    get:
      operationId: listBlockerCategories
      tags: [lookups]
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockerCategoryListResponse"
  /v1/lookups/blocker-severities:
    get:
      operationId: listBlockerSeverities
      tags: [lookups]
      responses:
        "200":
          description: Severities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockerSeverityListResponse"
  /v1/lookups/loss-archetypes:
    get:
      operationId: listLossArchetypes
      tags: [lookups]
      responses:
        "200":
          description: Archetypes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LossArchetypeListResponse"
  /v1/lookups/intervention-checklists:
    get:
      operationId: listInterventionChecklists
      tags: [lookups]
      responses:
        "200":
          description: Checklists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterventionChecklistListResponse"
  /v1/lookups/engine-thresholds:
    get:
      operationId: listEngineThresholds
      tags: [lookups]
      responses:
        "200":
          description: Thresholds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineThresholdListResponse"
    put:
      operationId: updateEngineThresholds
      tags: [lookups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThresholdsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineThresholdListResponse"
  /v1/lookups/fx-rates:
    get:
      operationId: listFxRates
      tags: [lookups]
      responses:
        "200":
          description: FX rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FxRateListResponse"
    put:
      operationId: updateFxRates
      tags: [lookups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FxRatesUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FxRateListResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    MessageResponse:
      type: object
      properties:
        message: { type: string }
      required: [message]

    ErrorDetail:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details:
          type: array
          items: { type: object, additionalProperties: true }
      required: [code, message]
    ErrorResponse:
      type: object
      properties:
        error: { $ref: "#/components/schemas/ErrorDetail" }
      required: [error]
    StageGuardrailError:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            patternCodes:
              type: array
              items: { type: string }
          required: [code, message, patternCodes]
      required: [error]

    LoginInput:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]
    AuthUser:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        role: { type: string }
      required: [id, email, role]

    Deal:
      type: object
      properties:
        id: { type: string }
        dealName: { type: string }
        accountName: { type: string }
        crmRecordUrl: { type: ["string", "null"] }
        accountManager: { type: string }
        technicalLead: { type: string }
        salesStageId: { type: integer }
        salesStage: { type: string }
        stageEnteredAt: { type: string }
        productRevenue: { type: number }
        pricingModelId: { type: integer }
        pricingModel: { type: string }
        contractTermYears: { type: integer }
        dealCurrency: { type: string }
        expectedCloseDate: { type: ["string", "null"] }
        winProbabilityPct: { type: ["integer", "null"] }
        servicesRevenue: { type: number }
        servicesTierId: { type: integer }
        servicesTier: { type: string }
        managerStrategicBlueprint: { type: ["string", "null"] }
        speakerNotes: { type: ["string", "null"] }
        lossReason: { type: ["string", "null"] }
        lossArchetypeId: { type: ["integer", "null"] }
        calculatedTCV: { type: number }
        normalizedTCV: { type: number }
        healthStatus: { type: string }
        archivedAt: { type: ["string", "null"] }
        deletedAt: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
      required:
        - id
        - dealName
        - accountName
        - accountManager
        - technicalLead
        - salesStageId
        - salesStage
        - productRevenue
        - servicesRevenue
        - dealCurrency
        - calculatedTCV
        - normalizedTCV
        - healthStatus
    DealInput:
      type: object
      properties:
        deal_name: { type: string, minLength: 1, maxLength: 255 }
        account_name: { type: string, minLength: 1, maxLength: 255 }
        crm_record_url: { type: ["string", "null"] }
        account_manager: { type: string, minLength: 1, maxLength: 255 }
        technical_lead: { type: string, minLength: 1, maxLength: 255 }
        sales_stage_id: { type: integer }
        product_revenue: { type: number, minimum: 0 }
        pricing_model_id: { type: integer }
        contract_term_years: { type: integer, minimum: 1, maximum: 10 }
        deal_currency: { type: string, minLength: 3, maxLength: 3 }
        expected_close_date: { type: ["string", "null"] }
        win_probability_pct: { type: ["integer", "null"] }
        services_revenue: { type: number, minimum: 0 }
        services_tier_id: { type: integer }
        manager_strategic_blueprint: { type: ["string", "null"] }
        speaker_notes: { type: ["string", "null"] }
        loss_archetype_id: { type: ["integer", "null"] }
      required:
        - deal_name
        - account_name
        - account_manager
        - technical_lead
        - sales_stage_id
        - product_revenue
        - pricing_model_id
