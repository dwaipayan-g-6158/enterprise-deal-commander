openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: Enterprise Deal Commander (EDC) Phase 1 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: deals
    description: Enterprise deal CRUD and lifecycle
  - name: gates
    description: Technical gate progression
  - name: blockers
    description: Deal blockers
  - name: crossSells
    description: Cross-sell products
  - name: intelligence
    description: Pattern engine and analytics
  - name: audit
    description: Audit trail, change digest, replay
  - name: history
    description: Phase 2 durable history (activity, health, snapshots)
  - name: governance
    description: Dispositions, interventions, bat-signal
  - name: lookups
    description: Reference data and engine tuning
  - name: config
    description: Pipeline configuration (period targets)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ============ AUTH ============
  /v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate the commander
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /v1/auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current commander
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============ DEALS ============
  /v1/deals:
    get:
      operationId: listDeals
      tags: [deals]
      summary: List deals
      parameters:
        - { name: search, in: query, required: false, schema: { type: string } }
        - { name: stage, in: query, required: false, schema: { type: string } }
        - { name: health, in: query, required: false, schema: { type: string, enum: [GREEN, YELLOW, RED] } }
        - { name: sort, in: query, required: false, schema: { type: string } }
        - { name: state, in: query, required: false, schema: { type: string, enum: [active, archived, deleted] } }
        - { name: limit, in: query, required: false, schema: { type: integer } }
        - { name: offset, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Deal list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealListResponse"
    post:
      operationId: createDeal
      tags: [deals]
      summary: Create a deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/deals/{id}:
    get:
      operationId: getDeal
      tags: [deals]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateDeal
      tags: [deals]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Stage guardrail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StageGuardrailError"
        "422":
          description: Loss archetype required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDeal
      tags: [deals]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Soft-deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/deals/{id}/restore:
    post:
      operationId: restoreDeal
      tags: [deals]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealResponse"
        "409":
          description: Not removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/deals/{id}/archive:
    post:
      operationId: archiveDeal
      tags: [deals]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealResponse"

  # ============ GATES ============
  /v1/deals/{dealId}/gates:
    get:
      operationId: listGates
      tags: [gates]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Gates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateListResponse"
  /v1/deals/{dealId}/gates/{gateCode}:
    put:
      operationId: updateGate
      tags: [gates]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: gateCode, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GateUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateMutationResponse"
  /v1/deals/{dealId}/gates/batch:
    put:
      operationId: updateGatesBatch
      tags: [gates]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GateBatchInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateBatchResponse"

  # ============ BLOCKERS ============
  /v1/deals/{dealId}/blockers:
    get:
      operationId: listBlockers
      tags: [blockers]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: resolved, in: query, required: false, schema: { type: boolean } }
      responses:
        "200":
          description: Blockers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockerListResponse"
    post:
      operationId: createBlocker
      tags: [blockers]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockerResponse"
  /v1/deals/{dealId}/blockers/{blockerId}:
    put:
      operationId: updateBlocker
      tags: [blockers]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: blockerId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockerResponse"
    delete:
      operationId: deleteBlocker
      tags: [blockers]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: blockerId, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Deleted

  # ============ CROSS-SELLS ============
  /v1/deals/{dealId}/cross-sells:
    get:
      operationId: listCrossSells
      tags: [crossSells]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Cross-sells
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossSellListResponse"
    put:
      operationId: updateCrossSells
      tags: [crossSells]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrossSellUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossSellListResponse"

  # ============ INTELLIGENCE ============
  /v1/deals/{dealId}/intelligence:
    get:
      operationId: getDealIntelligence
      tags: [intelligence]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Intelligence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceResponse"
  /v1/intelligence/summary:
    get:
      operationId: getIntelligenceSummary
      tags: [intelligence]
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResponse"
  /v1/intelligence/portfolio-analysis:
    get:
      operationId: getPortfolioAnalysis
      tags: [intelligence]
      responses:
        "200":
          description: Portfolio analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioAnalysisResponse"
  /v1/intelligence/product-mix:
    get:
      operationId: getProductMix
      tags: [intelligence]
      responses:
        "200":
          description: Product mix and whitespace across the active portfolio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductMixResponse"
  /v1/analytics/autopsy:
    get:
      operationId: getAutopsy
      tags: [intelligence]
      parameters:
        - { name: archetypeId, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Autopsy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutopsyResponse"

  # ============ AUDIT / TEMPORAL ============
  /v1/deals/{dealId}/audit:
    get:
      operationId: listAudit
      tags: [audit]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: entity_type, in: query, required: false, schema: { type: string } }
        - { name: field_changed, in: query, required: false, schema: { type: string } }
        - { name: since, in: query, required: false, schema: { type: string } }
        - { name: until, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer } }
        - { name: offset, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Audit log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditListResponse"
  /v1/deals/{dealId}/changes:
    get:
      operationId: listChanges
      tags: [audit]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: since, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Change digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangesResponse"
  /v1/deals/{dealId}/review-marker:
    post:
      operationId: setReviewMarker
      tags: [audit]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Marker set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewMarkerResponse"
  /v1/deals/{dealId}/snapshot:
    get:
      operationId: getSnapshot
      tags: [audit]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: date, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: Reconstructed snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotResponse"

  # ============ V2 DURABLE HISTORY ============
  /v2/activity:
    get:
      operationId: listPortfolioActivity
      tags: [history]
      parameters:
        - { name: since, in: query, required: false, schema: { type: string } }
        - { name: until, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer } }
        - { name: offset, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Portfolio-wide activity stream (all active deals, newest first)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityListResponse"
  /v2/deals/{dealId}/activity:
    get:
      operationId: listDealActivity
      tags: [history]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: event_type, in: query, required: false, schema: { type: string } }
        - { name: since, in: query, required: false, schema: { type: string } }
        - { name: until, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer } }
        - { name: offset, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Deal activity stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityListResponse"
  /v2/deals/{dealId}/health-history:
    get:
      operationId: listDealHealthHistory
      tags: [history]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: since, in: query, required: false, schema: { type: string } }
        - { name: until, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer } }
        - { name: offset, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Deal health transition history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthHistoryListResponse"
  /v2/deals/{dealId}/snapshots:
    get:
      operationId: listDealSnapshots
      tags: [history]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: since, in: query, required: false, schema: { type: string } }
        - { name: until, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer } }
        - { name: offset, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Deal snapshot list (metadata only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotListResponse"
  /v2/snapshots/{snapshotId}:
    get:
      operationId: getDealSnapshot
      tags: [history]
      parameters:
        - { name: snapshotId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Full snapshot with payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDetailResponse"

  # ============ GOVERNANCE ============
  /v1/deals/{dealId}/alerts/{patternCode}/disposition:
    put:
      operationId: setDisposition
      tags: [governance]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: patternCode, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DispositionInput"
      responses:
        "200":
          description: Disposition set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DispositionResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: clearDisposition
      tags: [governance]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
        - { name: patternCode, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Cleared
  /v1/deals/{dealId}/interventions:
    post:
      operationId: launchIntervention
      tags: [governance]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterventionInput"
      responses:
        "201":
          description: Launched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterventionResponse"
  /v1/deals/{dealId}/bat-signal:
    post:
      operationId: createBatSignal
      tags: [governance]
      parameters:
        - { name: dealId, in: path, required: true, schema: { type: string } }
      responses:
        "201":
          description: Share link minted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatSignalResponse"
  /v1/share/{token}:
    get:
      operationId: getSharedRiskCard
      tags: [governance]
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Read-only risk card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareCardResponse"
        "401":
          description: Expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============ LOOKUPS ============
  /v1/lookups/pipeline-stages:
    get:
      operationId: listPipelineStages
      tags: [lookups]
      responses:
        "200":
          description: Stages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStageListResponse"
  /v1/lookups/pricing-models:
    get:
      operationId: listPricingModels
      tags: [lookups]
      responses:
        "200":
          description: Models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingModelListResponse"
  /v1/lookups/services-tiers:
    get:
      operationId: listServicesTiers
      tags: [lookups]
      responses:
        "200":
          description: Tiers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicesTierListResponse"
  /v1/lookups/product-catalog:
    get:
      operationId: listProductCatalog
      tags: [lookups]
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
  /v1/lookups/competitors:
    get:
      operationId: listCompetitors
      tags: [lookups]
      responses:
        "200":
          description: Competitors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitorListResponse"
    post:
      operationId: createCompetitor
      tags: [lookups]
      summary: Create a competitor (combobox add-new)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompetitorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitorResponse"
  /v1/lookups/compliance-drivers:
    get:
      operationId: listComplianceDrivers
      tags: [lookups]
      responses:
        "200":
          description: Compliance drivers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceDriverListResponse"
    post:
      operationId: createComplianceDriver
      tags: [lookups]
      summary: Create a compliance driver (combobox add-new)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComplianceDriverInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceDriverResponse"
  /v1/lookups/team-members:
    get:
      operationId: listTeamMembers
      tags: [lookups]
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMemberListResponse"
    post:
      operationId: createTeamMember
      tags: [lookups]
      summary: Create a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamMemberInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMemberResponse"
  /v1/lookups/team-members/{id}:
    delete:
      operationId: deleteTeamMember
      tags: [lookups]
      summary: Soft-delete a team member
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/lookups/competitor-battlecards:
    get:
      operationId: listCompetitorBattlecards
      tags: [lookups]
      responses:
        "200":
          description: Competitor battlecards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitorBattlecardListResponse"
  /v1/lookups/gate-definitions:
    get:
      operationId: listGateDefinitions
      tags: [lookups]
      responses:
        "200":
          description: Gate definitions
          content:
            application/json:
              schema:
