        description: { type: ["string", "null"] }
        deal_id: { type: ["string", "null"] }
        is_global: { type: boolean }
        modifications: { type: array, items: { type: object, additionalProperties: true } }
      required: [scenario_name, modifications]
    ScenarioComputeInput:
      type: object
      properties:
        deal_id: { type: ["string", "null"] }
        modifications: { type: array, items: { type: object, additionalProperties: true } }
      required: [modifications]
    ScenarioListResponse:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Scenario" } }
      required: [data]
    ScenarioResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Scenario" }
      required: [data]

    # F1 Webhooks
    Webhook:
      type: object
      properties:
        id: { type: string }
        webhookName: { type: string }
        targetUrl: { type: string }
        events: { type: array, items: { type: string } }
        isActive: { type: boolean }
        failureCount: { type: integer }
        lastTriggeredAt: { type: ["string", "null"] }
        createdAt: { type: string }
      required: [id, webhookName, targetUrl, events, isActive, failureCount]
    WebhookInput:
      type: object
      properties:
        webhook_name: { type: string }
        target_url: { type: string }
        secret_key: { type: string }
        events: { type: array, items: { type: string } }
        is_active: { type: boolean }
      required: [webhook_name, target_url, events]
    WebhookListResponse:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Webhook" } }
      required: [data]
    WebhookResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Webhook" }
      required: [data]
    WebhookDelivery:
      type: object
      properties:
        id: { type: string }
        eventType: { type: string }
        responseStatus: { type: ["integer", "null"] }
        success: { type: boolean }
        deliveredAt: { type: string }
      required: [id, eventType, success, deliveredAt]
    WebhookDeliveryListResponse:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/WebhookDelivery" } }
      required: [data]

    # F10 Custom patterns
    CustomPatternConditionInput:
      type: object
      properties:
        field_path: { type: string }
        operator: { type: string }
        comparison_value: { type: string }
        sort_order: { type: integer }
      required: [field_path, operator, comparison_value, sort_order]
    CustomPattern:
      type: object
      properties:
        id: { type: string }
        patternName: { type: string }
        description: { type: ["string", "null"] }
        severity: { type: string }
        weight: { type: integer }
        alertMessageTemplate: { type: string }
        isActive: { type: boolean }
        triggerCount: { type: integer }
        conditions: { type: array, items: { type: object, additionalProperties: true } }
      required: [id, patternName, severity, weight, alertMessageTemplate, isActive]
    CustomPatternInput:
      type: object
      properties:
        pattern_name: { type: string }
        description: { type: ["string", "null"] }
        severity: { type: string }
        weight: { type: integer }
        alert_message_template: { type: string }
        is_active: { type: boolean }
        conditions: { type: array, items: { $ref: "#/components/schemas/CustomPatternConditionInput" } }
      required: [pattern_name, severity, weight, alert_message_template, conditions]
    CustomPatternListResponse:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/CustomPattern" } }
      required: [data]
    CustomPatternResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/CustomPattern" }
      required: [data]

    # F12 Notifications
    NotificationRule:
      type: object
      properties:
        id: { type: string }
        ruleName: { type: string }
        triggerEvent: { type: string }
        triggerConditions: { type: ["object", "null"], additionalProperties: true }
        channel: { type: string }
        isActive: { type: boolean }
      required: [id, ruleName, triggerEvent, channel, isActive]
    NotificationRuleInput:
      type: object
      properties:
        rule_name: { type: string }
        trigger_event: { type: string }
        trigger_conditions: { type: ["object", "null"], additionalProperties: true }
        channel: { type: string }
        is_active: { type: boolean }
      required: [rule_name, trigger_event]
    NotificationRuleListResponse:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/NotificationRule" } }
      required: [data]
    NotificationRuleResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/NotificationRule" }
      required: [data]
    Notification:
      type: object
      properties:
        id: { type: string }
        dealId: { type: ["string", "null"] }
        channel: { type: string }
        subject: { type: ["string", "null"] }
        message: { type: string }
        sentAt: { type: string }
        acknowledgedAt: { type: ["string", "null"] }
      required: [id, channel, message, sentAt]
    NotificationListResponse:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Notification" } }
      required: [data]

    # F16 Custom fields + tags
    CustomFieldDef:
      type: object
      properties:
        id: { type: string }
        fieldName: { type: string }
        fieldKey: { type: string }
        fieldType: { type: string }
        options: { type: ["array", "null"], items: { type: string } }
        isRequired: { type: boolean }
        displayOrder: { type: integer }
      required: [id, fieldName, fieldKey, fieldType, isRequired]
    CustomFieldDefInput:
      type: object
      properties:
        field_name: { type: string }
        field_key: { type: string }
        field_type: { type: string }
        options: { type: array, items: { type: string } }
        is_required: { type: boolean }
        display_order: { type: integer }
      required: [field_name, field_key, field_type]
    CustomFieldDefListResponse:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/CustomFieldDef" } }
      required: [data]
    CustomFieldDefResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/CustomFieldDef" }
      required: [data]
    CustomFieldValueInput:
      type: object
      properties:
        value_text: { type: ["string", "null"] }
        value_number: { type: ["number", "null"] }
        value_date: { type: ["string", "null"] }
        value_select: { type: ["string", "null"] }
        value_multi_select: { type: array, items: { type: string } }
    Tag:
      type: object
      properties:
        id: { type: string }
        tagName: { type: string }
        color: { type: string }
      required: [id, tagName, color]
    TagInput:
      type: object
      properties:
        tag_name: { type: string }
        color: { type: string }
      required: [tag_name, color]
    TagListResponse:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Tag" } }
      required: [data]
    TagResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Tag" }
      required: [data]

    # F19 NLC
    NlcParseInput:
      type: object
      properties:
        query: { type: string }
      required: [query]

    # Pipeline Targets (config)
    PipelineTarget:
      type: object
      required: [id, periodType, periodStart, targetValue]
      properties:
        id: { type: string, format: uuid }
        periodType: { type: string }
        periodStart: { type: string, format: date }
        targetValue: { type: number }
    PipelineTargetInput:
      type: object
      required: [periodStart, targetValue]
      properties:
        periodType: { type: string, default: quarter }
        periodStart: { type: string, format: date }
        targetValue: { type: number }
