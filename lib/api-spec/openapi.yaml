components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    MessageResponse:
      type: object
      properties:
        message: { type: string }
      required: [message]

    ErrorDetail:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details:
          type: array
          items: { type: object, additionalProperties: true }
      required: [code, message]
    ErrorResponse:
      type: object
      properties:
        error: { $ref: "#/components/schemas/ErrorDetail" }
      required: [error]
    StageGuardrailError:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            patternCodes:
              type: array
              items: { type: string }
          required: [code, message, patternCodes]
      required: [error]

    LoginInput:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]
    AuthUser:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        role: { type: string }
      required: [id, email, role]

    Deal:
      type: object
      properties:
        id: { type: string }
        dealName: { type: string }
        accountName: { type: string }
        crmRecordUrl: { type: ["string", "null"] }
        accountManager: { type: string }
        technicalLead: { type: string }
        salesStageId: { type: integer }
        salesStage: { type: string }
        stageEnteredAt: { type: string }
        productRevenue: { type: number }
        pricingModelId: { type: integer }
        pricingModel: { type: string }
        contractTermYears: { type: integer }
        dealCurrency: { type: string }
        expectedCloseDate: { type: ["string", "null"] }
        landedAt: { type: ["string", "null"] }
        winProbabilityPct: { type: ["integer", "null"] }
        committed: { type: boolean }
        servicesRevenue: { type: number }
        servicesTierId: { type: integer }
        servicesTier: { type: string }
        managerStrategicBlueprint: { type: ["string", "null"] }
        speakerNotes: { type: ["string", "null"] }
        lossReason: { type: ["string", "null"] }
        lossArchetypeId: { type: ["integer", "null"] }
        competitorId: { type: ["integer", "null"] }
        competitorName: { type: ["string", "null"] }
        complianceDriverId: { type: ["integer", "null"] }
        complianceDriverName: { type: ["string", "null"] }
        complianceDeadline: { type: ["string", "null"] }
        estimatedLogSources: { type: ["integer", "null"] }
        productsOfInterest:
          type: array
          items: { $ref: "#/components/schemas/CrossSell" }
        complianceDrivers:
          type: array
          items: { $ref: "#/components/schemas/ComplianceDriver" }
        calculatedTCV: { type: number }
        normalizedTCV: { type: number }
        healthStatus: { type: string }
        archivedAt: { type: ["string", "null"] }
        deletedAt: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
        matchedIn:
          type: array
          description: >-
            When a search query is supplied, the sources in which the term
            matched (e.g. name, notes, stakeholder, decision, blocker). Absent
            when not searching.
          items: { type: string }
        tags:
          type: array
          description: Tags applied to this deal (for roster display and filtering).
          items: { $ref: "#/components/schemas/Tag" }
      required:
        - id
        - dealName
        - accountName
        - accountManager
        - technicalLead
        - salesStageId
        - salesStage
        - productRevenue
        - servicesRevenue
        - dealCurrency
        - calculatedTCV
        - normalizedTCV
        - healthStatus
    DealInput:
      type: object
      properties:
        deal_name: { type: string, minLength: 1, maxLength: 255 }
        account_name: { type: string, minLength: 1, maxLength: 255 }
        crm_record_url: { type: ["string", "null"] }
        account_manager: { type: string, minLength: 1, maxLength: 255 }
        technical_lead: { type: string, minLength: 1, maxLength: 255 }
        sales_stage_id: { type: integer }
        product_revenue: { type: number, minimum: 0 }
        pricing_model_id: { type: integer }
        contract_term_years: { type: integer, minimum: 1, maximum: 10 }
        deal_currency: { type: string, minLength: 3, maxLength: 3 }
        expected_close_date: { type: ["string", "null"] }
        landed_at: { type: ["string", "null"] }
        win_probability_pct: { type: ["integer", "null"] }
        committed: { type: boolean }
        services_revenue: { type: number, minimum: 0 }
        services_tier_id: { type: integer }
        manager_strategic_blueprint: { type: ["string", "null"] }
        speaker_notes: { type: ["string", "null"] }
        loss_archetype_id: { type: ["integer", "null"] }
        competitor_id: { type: ["integer", "null"] }
        compliance_driver_id: { type: ["integer", "null"] }
        estimated_log_sources: { type: ["integer", "null"] }
        product_interest_ids:
          type: array
          items: { type: string }
        compliance_driver_ids:
          type: array
          items: { type: integer }
      required:
        - deal_name
        - account_name
        - account_manager
        - technical_lead
        - sales_stage_id
        - product_revenue
        - pricing_model_id
        - contract_term_years
        - services_revenue
        - services_tier_id
    DealUpdate:
      type: object
      properties:
        deal_name: { type: string, minLength: 1, maxLength: 255 }
        account_name: { type: string, minLength: 1, maxLength: 255 }
        crm_record_url: { type: ["string", "null"] }
        account_manager: { type: string, minLength: 1, maxLength: 255 }
        technical_lead: { type: string, minLength: 1, maxLength: 255 }
        sales_stage_id: { type: integer }
        product_revenue: { type: number, minimum: 0 }
        pricing_model_id: { type: integer }
        contract_term_years: { type: integer, minimum: 1, maximum: 10 }
        deal_currency: { type: string, minLength: 3, maxLength: 3 }
        expected_close_date: { type: ["string", "null"] }
        landed_at: { type: ["string", "null"] }
        win_probability_pct: { type: ["integer", "null"] }
        committed: { type: boolean }
        services_revenue: { type: number, minimum: 0 }
        services_tier_id: { type: integer }
        manager_strategic_blueprint: { type: ["string", "null"] }
        speaker_notes: { type: ["string", "null"] }
        loss_archetype_id: { type: ["integer", "null"] }
        loss_reason: { type: ["string", "null"], maxLength: 2000 }
        competitor_id: { type: ["integer", "null"] }
        compliance_driver_id: { type: ["integer", "null"] }
        estimated_log_sources: { type: ["integer", "null"] }
        product_interest_ids:
          type: array
          items: { type: string }
        compliance_driver_ids:
          type: array
          items: { type: integer }
        override_reason: { type: string, minLength: 10, maxLength: 1000 }
    DealResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Deal" }
      required: [data]
    ListMeta:
      type: object
      properties:
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
      required: [total, limit, offset]
    DealListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Deal" }
        meta: { $ref: "#/components/schemas/ListMeta" }
      required: [data, meta]

    Gate:
      type: object
      properties:
        gateCode: { type: string }
        label: { type: string }
        gateGroup: { type: integer }
        description: { type: ["string", "null"] }
        sortOrder: { type: integer }
        isCompleted: { type: boolean }
        completedAt: { type: ["string", "null"] }
        completedBy: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        prerequisiteGateCodes:
          type: array
          items: { type: string }
      required: [gateCode, label, gateGroup, sortOrder, isCompleted]
    IntegrityWarning:
      type: object
      properties:
        gateCode: { type: string }
        type: { type: string, enum: [out_of_order, regression] }
        message: { type: string }
      required: [gateCode, type, message]
    GateUpdateInput:
      type: object
      properties:
        is_completed: { type: boolean }
        notes: { type: string, maxLength: 1000 }
      required: [is_completed]
    GateBatchItem:
      type: object
      properties:
        gate_code: { type: string }
        is_completed: { type: boolean }
        notes: { type: string, maxLength: 1000 }
      required: [gate_code, is_completed]
    GateBatchInput:
      type: object
      properties:
        updates:
          type: array
          items: { $ref: "#/components/schemas/GateBatchItem" }
      required: [updates]
    GateListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Gate" }
      required: [data]
    GateMutationResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Gate" }
        integrityWarnings:
          type: array
          items: { $ref: "#/components/schemas/IntegrityWarning" }
      required: [data, integrityWarnings]
    GateBatchResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Gate" }
        integrityWarnings:
          type: array
          items: { $ref: "#/components/schemas/IntegrityWarning" }
      required: [data, integrityWarnings]

    Blocker:
      type: object
      properties:
        id: { type: string }
        categoryId: { type: integer }
